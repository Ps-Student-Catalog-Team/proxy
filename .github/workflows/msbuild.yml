name: MSBuild

# 触发条件：push 到 master 分支，或推送任意标签，或向 master 发起 PR
on:
  push:
    branches: [ "master" ]
    tags:
      - '*'          # 匹配所有标签，可按需调整，如 'v*' 只匹配以 v 开头的标签
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

# 设置权限：需要写入权限才能创建 Release
permissions:
  contents: write
  # 其他权限可保留默认

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    # （可选）上传构建产物作为 Artifact，方便调试和手动下载
    - name: Upload build artifacts (for debugging)
      uses: actions/upload-artifact@v4
      with:
        name: proxy-${{ runner.os }}-${{ env.BUILD_CONFIGURATION }}
        path: |
          x64/Release/*.exe
          x64/Release/*.pdb

    # 仅在推送标签时运行：创建 Release 并上传文件
    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        # 要上传的文件，支持通配符和多个路径
        files: |
          x64/Release/*.exe
          x64/Release/*.pdb
        # 可选：自定义 Release 名称和正文
        name: Release ${{ github.ref_name }}
        body: "Automated release for ${{ github.ref_name }}"
        draft: false          # 是否为草稿
        prerelease: false     # 是否为预发布
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
